<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 240" role="img" aria-labelledby="title desc">
  <title id="title">Click To Boost logo</title>
  <desc id="desc">A rising teal arrow over a bar chart and cursor icon next to the words Click To Boost.</desc>
  <defs>
    <linearGradient id="navyGradient" x1="260" y1="30" x2="560" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2A4A"/>
      <stop offset="1" stop-color="#123B63"/>
    </linearGradient>
    <linearGradient id="tealGradient" x1="64" y1="150" x2="575" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FAE9C"/>
      <stop offset="0.55" stop-color="#2EC4B6"/>
      <stop offset="1" stop-color="#3ED1C0"/>
    </linearGradient>
    <linearGradient id="blueTealGradient" x1="74" y1="205" x2="184" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C6E8C"/>
      <stop offset="1" stop-color="#2A8FA3"/>
    </linearGradient>
  </defs>
  <rect width="620" height="240" rx="28" fill="#FFFFFF"/>
  <g fill="url(#blueTealGradient)">
    <rect x="72" y="145" width="26" height="62" rx="4"/>
    <rect x="116" y="119" width="26" height="88" rx="4"/>
    <rect x="160" y="92" width="26" height="115" rx="4"/>
  </g>
  <path d="M46 131 L94 112 L124 77 L151 91 L197 31" fill="none" stroke="url(#tealGradient)" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter"/>
  <path d="M190 27 L235 20 L220 64 Z" fill="#3ED1C0"/>
  <g transform="translate(54 136)">
    <path d="M0 0 L72 43 L45 53 L59 88 L37 97 L23 61 L3 82 Z" fill="#FFFFFF" stroke="#0B2A4A" stroke-width="12" stroke-linejoin="round"/>
    <path d="M0 0 L72 43 L45 53 L59 88 L37 97 L23 61 L3 82 Z" fill="#FFFFFF"/>
  </g>
  <g font-family="Inter, Montserrat, Arial, sans-serif" font-weight="900" letter-spacing="2">
    <text x="263" y="91" fill="url(#navyGradient)" font-size="54">CLICK TO</text>
    <text x="263" y="171" fill="url(#tealGradient)" font-size="78">BOOST</text>
  </g>
</svg>
