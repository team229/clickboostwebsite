<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 240" role="img" aria-labelledby="title desc">
  <title id="title">Click To Boost logo</title>
  <desc id="desc">A rising teal arrow over a bar chart and cursor icon next to the words Click To Boost.</desc>
  <defs>
    <linearGradient id="arrowGradient" x1="67" y1="140" x2="223" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A8ACA"/>
      <stop offset="1" stop-color="#39C98B"/>
    </linearGradient>
    <linearGradient id="boostGradient" x1="262" y1="134" x2="569" y2="134" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A8ACA"/>
      <stop offset="1" stop-color="#32C38A"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M46 130 L94 111 L124 76 L151 90 L196 30" stroke="url(#arrowGradient)" stroke-width="19"/>
    <path d="M190 27 L234 20 L220 63 Z" fill="#35C88C" stroke="#35C88C" stroke-width="2"/>
  </g>

  <g fill="#0F5F74">
    <rect x="74" y="141" width="24" height="64" rx="2"/>
    <rect x="116" y="116" width="24" height="89" rx="2"/>
    <rect x="158" y="91" width="24" height="114" rx="2"/>
  </g>

  <g transform="translate(54 136)">
    <path d="M0 0 L72 43 L45 53 L59 88 L37 97 L23 61 L3 82 Z" fill="#FFFFFF" stroke="#0F5F74" stroke-width="12" stroke-linejoin="round"/>
    <path d="M0 0 L72 43 L45 53 L59 88 L37 97 L23 61 L3 82 Z" fill="#FFFFFF"/>
  </g>

  <g font-family="Inter, Montserrat, Arial, sans-serif" font-weight="800" letter-spacing="2">
    <text x="263" y="91" fill="#203342" font-size="54">CLICK TO</text>
    <text x="263" y="171" fill="url(#boostGradient)" font-size="78">BOOST</text>
  </g>
</svg>
